name: ejecutar-robots

on:
  push:
    branches: ["main"] # O la rama que uses
  schedule:
    - cron: '0 * * * *' # Esto corre el bot cada hora, por ejemplo
  workflow_dispatch:

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 1️⃣ Ejecutar Extractor de Noticias
        run: python tu_script_noticias.py # Cambia por tu nombre real de archivo

      - name: 2️⃣ Ejecutar Dibujante del Mapa
        run: python tu_script_mapa.py # Cambia por tu nombre real de archivo

      - name: Configurar Páginas de GitHub
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sube todo el contenido de la carpeta raíz

      - name: 3️⃣ Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
